fdswarm {

  # shown in the Modes list
  modes = ["CW", "PH", "DIGI"]

  httpPort = 8080
  
  discovery {
    Port = 8099
    timeoutMs = 3000
  }
  statusPort = 8098
  broadcastAddress = "255.255.255.255"

  contests = [
    {
      name = ARRL
      classChars = [
        {
          ch = A
          description = "Club / group portable station (not at a home location)"
        },
        {
          ch = B
          description = "One or two person portable"
        },
        {
          ch = C
          description = Mobile
        },
        {
          ch = D
          description = "Home station (commercial power)"
        },
        {
          ch = E
          description = "Home station (emergency power)"
        },
       {
          ch = F
          description = "EOC (Emergency Operations Center)"
        },
      ]

    },
    {
      name = WFD
      classChars = [
        {
          ch = I
          description = Indoor
        },
        {
          ch = O
          description = Outdoor
        },
        {
          ch = M
          description = Mobile
        },
        {
          ch = D
          description = "Home station (commercial power)"
        },
        {
          ch = E
          description = "Home station (emergency power)"
        },
       {
          ch = F
          description = "EOC (Emergency Operations Center)"
        },
      ]

    }
  ]

  # shown in the Bands list (match your HamBandCatalog bandName values)
  bands = ["160m", "80m", "40m", "20m", "15m", "10m", "6m", "2m"]

  hamBands = [

    # Order is the order that will appear UIs.
    {
      bandName = "160m"
      startFrequencyHz = 1800000
      endFrequencyHz = 2000000
      bandClass = "MF"
      regions = [ALL]
    },

    # HF
    {
      bandName = "80m"
      startFrequencyHz = 3500000
      endFrequencyHz = 4000000
      bandClass = "HF"
      regions = [ALL]
    },
    {
      bandName = "60m"
      startFrequencyHz = 5250000
      endFrequencyHz = 5450000
      bandClass = "HF"
      ituRegionAvailability = {
        type = "VariesByCountry"
