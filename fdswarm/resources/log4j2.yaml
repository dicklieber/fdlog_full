Configuration:
  status: warn

  Appenders:
    Console:
      name: TestConsole
      target: SYSTEM_ERR
      PatternLayout:
        Pattern: "%highlight{%-5level}{FATAL=bg_red, ERROR=red, WARN=yellow, INFO=green, DEBUG=blue, TRACE=cyan} %msg%n"


  Loggers:
    Logger:
      - name: "fdlog.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.StationManager"
        level: trace
        additivity: true

    Root:
      level: info
      AppenderRef:
        - ref: TestConsole