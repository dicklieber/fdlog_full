Configuration:
  status: warn

  Appenders:
    Console:
      name: TestConsole
      target: SYSTEM_ERR
      PatternLayout:
        Pattern: "%logger{36} %highlight{%-5level}{FATAL=bg_red, ERROR=red, WARN=yellow, INFO=green, info=blue, info=cyan}  %msg%n"

    File:
      - name: FileAppender
        fileName: "${sys:fdlog.logFile}"
        PatternLayout:
          Pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

      - name: AccessLogAppender
        fileName: "${sys:fdlog.accessLogFile}"
        PatternLayout:
          Pattern: "%msg%n"


  Loggers:
    Logger:
      - name: "fdlog.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.fx.qso.QsoEntryPanel"
        level: info
        additivity: true

      - name: "fdswarm.StationManager"
        level: info
        additivity: true

      - name: "fdswarm.fx.ConfigModule"
        level: info
        additivity: true


      - name: "fdswarm.replication.NodeStatusService"
        level: info
        additivity: true

      - name: "fdswarm.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.replication.NodeStatusSender"
        level: info
        additivity: true

      - name: "fdswarm.fx.tools.FdHourDialogService"
        level: info
        additivity: true

      - name: "fdswarm.api.QsoRoutes"
        level: info
        additivity: true

      - name: "fdswarm.replication.NodeStatusHandler"
        level: info
        additivity: true

      - name: "org.http4s.server.middleware.Logger"
        level: info
        additivity: false
        AppenderRef:
          - ref: AccessLogAppender

    Root:
      level: info
      AppenderRef:
        - ref: TestConsole
        - ref: FileAppender