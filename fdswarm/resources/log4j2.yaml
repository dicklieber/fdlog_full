Configuration:
  status: warn

  Appenders:
    Console:
      name: TestConsole
      target: SYSTEM_ERR
      PatternLayout:
        Pattern: "%logger{36} %highlight{%-5level}{FATAL=bg_red, ERROR=red, WARN=yellow, INFO=green, DEBUG=blue, info=cyan}  %msg%n"


  Loggers:
    Logger:
      - name: "fdlog.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.fx.qso.QsoEntryPanel"
        level: info
        additivity: true

      - name: "fdswarm.StationManager"
        level: info
        additivity: true

      - name: "fdswarm.fx.ConfigModule"
        level: info
        additivity: true

      - name: "fdswarm.replication.DiscoveryService"
        level: debug
        additivity: true
      - name: "fdswarm.replication.NodeStatusService"
        level: trace
        additivity: true

      - name: "fdswarm.store.QsoStore"
        level: info
        additivity: true

    Root:
      level: info
      AppenderRef:
        - ref: TestConsole