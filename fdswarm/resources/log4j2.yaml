Configuration:
  status: warn

  Appenders:
    Console:
      name: TestConsole
      target: SYSTEM_ERR
      PatternLayout:
        Pattern: "%logger{36} %highlight{%-5level}{FATAL=bg_red, ERROR=red, WARN=yellow, INFO=green, DEBUG=blue, info=cyan}  %msg%n"

    File:
      name: FileAppender
      fileName: "${sys:fdlog.logFile}"
      PatternLayout:
        Pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"


  Loggers:
    Logger:
      - name: "fdlog.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.fx.qso.QsoEntryPanel"
        level: info
        additivity: true

      - name: "fdswarm.StationManager"
        level: info
        additivity: true

      - name: "fdswarm.fx.ConfigModule"
        level: info
        additivity: true


      - name: "fdswarm.replication.NodeStatusService"
        level: info
        additivity: true

      - name: "fdswarm.store.QsoStore"
        level: info
        additivity: true

      - name: "fdswarm.replication.NodeStatusSender"
        level: trace
        additivity: true

      - name: "fdswarm.fx.tools.FdHourDialogService"
        level: info
        additivity: true

      - name: "fdswarm.api.QsoRoutes"
        level: debug
        additivity: true

      - name: "fdswarm.replication.NodeStatusHandler"
        level: trace
        additivity: true

    Root:
      level: info
      AppenderRef:
        - ref: TestConsole
        - ref: FileAppender