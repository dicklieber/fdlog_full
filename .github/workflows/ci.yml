name: CI
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        id: tests
        run: ./mill fdswarm.test
        continue-on-error: true

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: fdswarm tests
          path: "**/test-reports/**/*.xml"
          reporter: java-junit

      - name: Fail job if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1