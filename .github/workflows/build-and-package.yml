name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-assembly:
    name: Build Assembly JAR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk+fx
          cache: sbt
          cache-dependency-path: |
            build.mill
            **/*.mill
            .mill-version

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Run tests
        run: xvfb-run -a ./mill --no-daemon fdswarm.test

      - name: Generate JUnit XML test report
        if: always()
        run: |
          mkdir -p test-reports

          curl -fsSL https://raw.githubusercontent.com/vic/mill-test-junit-report/master/generate-junit-report.sc -o generate-junit-report.sc
          curl -fsSL https://github.com/com-lihaoyi/Ammonite/releases/download/3.0.0/2.13-3.0.0 -o amm
          chmod +x amm

          if [ -f out/fdswarm/test/test/dest/out.json ]; then
            ./amm generate-junit-report.sc \
              "fdswarm.test" \
              "fdswarm tests" \
              "test-reports/fdswarm.xml" \
              "out/fdswarm/test/test/dest/out.json"
          else
            echo "Mill test output JSON not found: out/fdswarm/test/test/dest/out.json"
            exit 1
          fi

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports/*.xml
          if-no-files-found: warn

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'test-reports/*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: false

      - name: Build assembly
        run: ./mill --no-daemon fdswarm.assembly

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest/fdswarm-all.jar

  package-windows:
    name: Package Windows (MSI)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 20
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk+fx
          cache: sbt
          cache-dependency-path: |
            build.mill
            **/*.mill
            .mill-version

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build winMsi
        run: .\mill.bat --no-daemon fdswarm.winMsi
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Windows-MSI
          path: out/fdswarm/winMsi.dest/jpackage-win-*/*.msi

  package-macos:
    name: Package macOS (PKG)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-latest
    timeout-minutes: 20
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk+fx
          cache: sbt
          cache-dependency-path: |
            build.mill
            **/*.mill
            .mill-version

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build macPkg
        run: ./mill --no-daemon fdswarm.macPkg
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-macOS-PKG
          path: out/fdswarm/macPkg.dest/jpackage/*.pkg o o