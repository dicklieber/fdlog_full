name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-assembly:
    name: Build Assembly JAR
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Run tests
        continue-on-error: true
        run: xvfb-run -a ./mill --no-daemon fdswarm.test

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'out/fdswarm/test/**/*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: true

      - name: Generate HTML test report
        if: always()
        shell: bash
        run: |
          python -m pip install --upgrade pip junit2html
          mkdir -p out/reports
          xml_file="$(find out/fdswarm/test -name 'test-report.xml' | head -n 1)"
          test -n "$xml_file"
          junit2html "$xml_file" out/reports/test-report.html

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report-HTML
          path: out/reports/test-report.html
          if-no-files-found: error
          retention-days: 5

      - name: Generate Scoverage reports
        if: always()
        run: |
          ./mill --no-daemon fdswarm.scoverage.htmlReport
          ./mill --no-daemon fdswarm.scoverage.xmlReport

      - name: Upload Scoverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Report-HTML
          path: out/fdswarm/scoverage/htmlReport.dest/
          if-no-files-found: error
          retention-days: 5

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x scripts/update-coverage-badge.sh
          ./scripts/update-coverage-badge.sh

      - name: Commit and push badge update
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update coverage badge [skip ci]" --trailer "Co-authored-by: Junie <junie@jetbrains.com>" && git push)

      - name: Build assembly
        if: success()
        run: ./mill --no-daemon fdswarm.assembly

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest/fdswarm-all.jar
          if-no-files-found: error
          retention-days: 7

  package-windows:
    name: Package Windows (MSI)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref_type == 'tag'
    runs-on: windows-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~\.cache\coursier
            ~\.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build winMsi
        run: .\mill.bat --no-daemon fdswarm.winMsi
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Windows-MSI
          path: out/fdswarm/winMsi.dest/jpackage-win-*/*.msi
          if-no-files-found: error
          retention-days: 7

  package-macos:
    name: Package macOS (PKG)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref_type == 'tag'
    runs-on: macos-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Build macPkg
        run: ./mill --no-daemon fdswarm.macPkg
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-macOS-PKG
          path: out/fdswarm/macPkg.dest/jpackage/*.pkg
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: [package-windows, package-macos]
    permissions:
      contents: write

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: release-artifacts

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Windows-MSI
          path: release-artifacts

      - name: Download macOS PKG artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-macOS-PKG
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.jar
            release-artifacts/**/*.msi
            release-artifacts/**/*.pkg
          draft: false
          prerelease: false
          generate_release_notes: true
