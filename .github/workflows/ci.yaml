name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-assembly:
    name: Build Assembly JAR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Run tests and generate JUnit XML
        continue-on-error: true
        run: xvfb-run -a ./mill --no-daemon fdswarm.test

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'out/fdswarm/test/**/*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: true

      - name: Build assembly
        if: success()
        run: ./mill --no-daemon fdswarm.assembly

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest/fdswarm-all.jar
          if-no-files-found: error

  package-windows:
    name: Package Windows (MSI)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~\.cache\coursier
            ~\.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Build winMsi
        run: .\mill.bat --no-daemon fdswarm.winMsi
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Windows-MSI
          path: out/fdswarm/winMsi.dest/jpackage-win-*/*.msi
          if-no-files-found: error

  package-macos:
    name: Package macOS (PKG)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-latest
    timeout-minutes: 25
    needs: package-assembly

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: FdSwarm-Assembly-JAR
          path: out/fdswarm/assembly.dest

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Build macPkg
        run: ./mill --no-daemon fdswarm.macPkg
        env:
          FDSWARM_ASSEMBLY_JAR: out/fdswarm/assembly.dest/fdswarm-all.jar

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-macOS-PKG
          path: out/fdswarm/macPkg.dest/jpackage/*.pkg
          if-no-files-found: error