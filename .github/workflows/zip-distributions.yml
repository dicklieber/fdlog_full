name: Zip Distributions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional package version, for example 1.2.3 or v1.2.3. Tag builds use the tag name.'
        required: false
        type: string

env:
  FDSWARM_BUILD: ${{ github.run_number }}

jobs:
  build-zips:
    name: Build Zip Distributions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set package version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.release_version }}
        run: ./scripts/ci/set-package-version.sh

      - name: Set up JDK 21 (Full)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Cache Mill / Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('*.mill', '.mill-version', '.mill-jvm-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Make mill executable
        run: chmod +x ./mill

      - name: Build assembly once
        run: ./mill --no-daemon fdswarm.assembly

      - name: Download bundled Liberica JDK runtimes
        shell: bash
        run: ./scripts/fetch-liberica-runtimes.sh --dest "$RUNNER_TEMP/fdswarm-runtimes" --github-env "$GITHUB_ENV"

      - name: Build zip distributions
        run: ./mill --no-daemon fdswarm.distAll

      - name: Upload zip distributions
        uses: actions/upload-artifact@v4
        with:
          name: FdSwarm-Zip-Distributions
          path: out/fdswarm/dist*.dest/*.zip
          if-no-files-found: error
          retention-days: 3
