Configuration:
  status: WARN

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      JsonLayout:
        compact: true
        eventEol: true
        properties: true

    RollingFile:
      name: File
      fileName: logs/app.log
      filePattern: logs/app-%d{yyyy-MM-dd}.log.gz
      JsonLayout:
        compact: true
        eventEol: true
        properties: true
      Policies:
        TimeBasedTriggeringPolicy:
          interval: 1

  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: Console
        - ref: File

