  scoring {
    rules {
      arrl {
        multiplier-tiers = [
          { max-power = 5, non-commercial = true,  multiplier = 5.0 }
          { max-power = 5, non-commercial = false, multiplier = 2.0 }
          { max-power = 100, non-commercial = true,  multiplier = 2.0 }
          { max-power = 100, non-commercial = false, multiplier = 2.0 }
          { max-power = 100000, non-commercial = true,  multiplier = 1.0 }
          { max-power = 100000, non-commercial = false, multiplier = 1.0 }
        ]
      }

      wfd {
        flag-objective-values {
          away-from-home = 3
          qrp = 4
          alternative-power = 1
          multiple-antennas = 1
          satellite-qso = 1
          winlink-message = 1
