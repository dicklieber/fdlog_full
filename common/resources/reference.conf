fdswarm {

  # shown in the Modes list
  modes = ["CW", "PH", "DIGI"]

  httpPort = 8080
  # UDP transport: "Multicast" or "Broadcast"
  transportType = "Broadcast"

  elastic {
    endpoint = "http://localhost:9200/_bulk"
    apiKey = "QjRJbGpaMEJGdFU3dWlwbWNVZ046ZmYwUzZTV1VvTWVSbG1WQWI0dGRVdw=="
    connectTimeout = 5s
    requestTimeout = 15s
  }

  UDP {
    port = 8900
    groupAddr = 239.192.0.88
  }

  autoStartSeconds = 4
  broadcastPeriodSec = 10
  contestDiscoveryTimeout = 5s
  contestTimerUpdateSec = 5
  contestChangeIgnoreStatusSec = 7
  nodeBandOpRefreshSeconds = 1
  ageRefreshDuration = 1s

  contests = [
    {
      name = ARRL
      classChoices = [
        {
          ch = A
          description = "Club / group portable station (not at a home location)"
        },
        {
          ch = B
          description = "One or two person portable"
        },
        {
          ch = C
          description = Mobile
        },
        {
          ch = D
          description = "Home station (commercial power)"
        },
        {
          ch = E
          description = "Home station (emergency power)"
        },
        {
          ch = F
          description = "EOC (Emergency Operations Center)"
        },
      ]

    },
    {
      name = WFD
      classChoices = [
        {
          ch = I
          description = Indoor
        },
        {
          ch = O
          description = Outdoor
        },
        {
          ch = M
          description = Mobile
        },
        {
          ch = D
          description = "Home station (commercial power)"
        },
        {
          ch = E
          description = "Home station (emergency power)"
        },
        {
          ch = F
          description = "EOC (Emergency Operations Center)"
        },
      ]

    }
  ]

  ageStyles {
    nodeAging {
      purgeAfter = 60s
      thresholds = [
        {
          duration = 10s
          style = "fresh"
        },
        {
          duration = 15s
          style = "old"
        },
        {
          duration = 30s
          style = "stale"
        }
      ]
    }
  }

  availableBands {
    dir = ""
    fileName = "available-bands.json"
  }

  sections = [
    {
      name = "US"
