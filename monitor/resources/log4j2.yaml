Configuration:
  status: warn
  name: MonitorLogging

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        Pattern: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%t] %c - %msg%n"

  Loggers:

    Logger:
      - name: monitor.UdpPacketListener
        level: trace

    Root:
      level: info
      AppenderRef:
        - ref: Console
